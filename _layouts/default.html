<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+Pro:wght@300;400;600&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    
    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>○</text></svg>">
    {% seo %}
</head>
<body>
    <div class="container">
        <div class="layout">
            <!-- 主内容区 -->
            <main class="main-content">
                {{ content }}
            </main>
            <!-- 侧边栏 -->
            {% include sidebar.html %}
        </div>
    </div>

    <!-- 搜索功能 -->
    <script>
    (function() {
        var searchInput = document.getElementById('search-input');
        var searchResults = document.getElementById('search-results');
        var posts = [];
        var dataLoaded = false;

        // 加载搜索数据
      fetch('https://no-ego.com/search.json')
            .then(function(response) { return response.json(); })
            .then(function(data) { 
                posts = data; 
                dataLoaded = true;
            })
            .catch(function(error) {
                console.log('搜索数据加载失败:', error);
            });

        // 搜索功能
        if (searchInput) {
            searchInput.addEventListener('input', function() {
                var query = this.value.toLowerCase().trim();
                searchResults.innerHTML = '';
                
                if (!dataLoaded) {
                    searchResults.style.display = 'block';
                    searchResults.innerHTML = '<div class="search-no-result">加载中...</div>';
                    return;
                }

                if (query.length < 2) {
                    searchResults.style.display = 'none';
                    return;
                }

                var results = posts.filter(function(post) {
                    return post.title.toLowerCase().indexOf(query) !== -1 || 
                           post.content.toLowerCase().indexOf(query) !== -1;
                }).slice(0, 5);

                if (results.length > 0) {
                    searchResults.style.display = 'block';
                    results.forEach(function(post) {
                        var div = document.createElement('div');
                        div.className = 'search-result-item';
                        div.innerHTML = '<a href="' + post.url + '">' +
                            '<span class="search-date">' + post.date + '</span>' +
                            '<span class="search-title">' + post.title + '</span></a>';
                        searchResults.appendChild(div);
                    });
                } else {
                    searchResults.style.display = 'block';
                    searchResults.innerHTML = '<div class="search-no-result">没有找到结果</div>';
                }
            });

            // 点击外部关闭搜索结果
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                    searchResults.style.display = 'none';
                }
            });
        }
    })();
    </script>
</body>
</html>
